<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!--  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap" rel="stylesheet">
    <!-- Style CSS -->
    <link rel="stylesheet" href="style.css">
    <title>A mail for you.</title>
</head>
<body>
    <div class="container">
        <div class="box">
        <h2 class="top-txt">You got a Mail!!</h2>
        <h2 class="bottom-txt">Tap to Open it</h2>
            <div class="env-wrap">
                <img src="img/env-close.jpeg" alt="" class="env-closed">
                <img src="img/env-open-bg.png" alt="" class="env-opend">
                <div class="env-msg">
                    <img src="img/paper-2.png" alt="" class="env-paper">
                    <div class="msg-txt">
                        <div id="dynamic-msg"></div>
                        <br>- your loml.
                    </div>
                </div>
                <img src="img/env-bottom-flap-bg.png" alt="" class="env-topFlap">
            </div>
        </div>
    </div>

    <script>
        const messages = [
        "It was always you.",
        "I would rather share one lifetime with you than face all the ages of this world alone.",
        "You make me want to be a better man.",
        "If you're a bird, I'm a bird.",
        "Death cannot stop true love. All it can do is delay it for a while.",
        "I wish I had done everything on Earth with you.",
        "Love is the one thing we're capable of perceiving that transcends dimensions of time and space.",
        "The best love is the kind that awakens the soul.",
        "It's not going to be easy. It's going to be really hard. But I want to do that because I want you.",
        "I knew the second I met you that there was something about you I needed.",
        "You are my greatest adventure.",
        "Whatever our souls are made of, yours and mine are the same.",
        "I think I'd miss you even if we'd never met.",
        "When I look at you, I can feel it. I look at you, and I'm home.",
        "I love you without knowing how, or when, or from where.",
        "I have crossed oceans of time to find you.",
        "You are my heart, my life, my one and only thought.",
        "If I know what love is, it is because of you.",
        "The greatest thing you'll ever learn is just to love and be loved in return.",
        "Every day I spend with you becomes the new best day of my life.",
        "You are the answer to every prayer I've ever offered.",
        "I choose you. And I'll choose you over and over.",
        "All I want is all of you, forever.",
        "You are my today and all of my tomorrows.",
        "You are, and always have been, my dream.",
        "You make ordinary moments feel extraordinary.",
        "Forever doesn't seem long enough with you.",
        "I found home the day I found you.",
        "You were worth the wait.",
        "Every love story is beautiful, but ours is my favorite."
        ];

        function setRandomMessage() {
        const msgElement = document.querySelector('#dynamic-msg');
        const randomIndex = Math.floor(Math.random() * messages.length);
        msgElement.textContent = messages[randomIndex];
        }

        // Set random text on page load
        setRandomMessage();

        // Toggle class and change text on click
        document.querySelector('.env-wrap').addEventListener('click', function() {
        this.classList.toggle('active');
        setRandomMessage();
        });
    </script>
</body>
</html>
